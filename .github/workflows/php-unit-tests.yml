name: Unit Tests
run-name: ${{ github.actor }} is running tests
on:
  workflow_call:

jobs:
  tests:

    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        php: [ '8.4', '8.5' ]

    steps:
      - uses: actions/checkout@v3

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}

      - name: Install packages
        run: composer install --prefer-dist --no-progress

      - name: Run tests
        run: composer test
