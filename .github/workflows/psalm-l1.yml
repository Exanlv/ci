name: Unit Tests
run-name: ${{ github.actor }} is running tests
on:
  workflow_call:

jobs:
  tests:

    runs-on: ubuntu

    strategy:
      fail-fast: false

    steps:
      - uses: actions/checkout@v3

      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: 8.5

      - name: Install packages
        run: composer install --prefer-dist --no-progress

      - name: Run psalm
        run: vendor/bin/psalm --show-info --error-level=1
